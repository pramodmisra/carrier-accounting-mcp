version: "3.8"

# Production deployment for agency.5gvector.com
# Usage: docker compose -f deploy/docker-compose.prod.yml up -d

services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - web
    restart: unless-stopped

  api:
    build:
      context: ..
      dockerfile: Dockerfile.api
    env_file: ../.env
    environment:
      - DEV_API_KEY=${DEV_API_KEY:-}
      - DEV_TENANT_ID=default
      - DATABASE_URL=postgresql://carrier:${DB_PASSWORD:-carrier}@postgres:5432/carrier_platform
    depends_on:
      - postgres
    volumes:
      - uploads:/app/uploads
      - exports:/app/exports
    restart: unless-stopped

  web:
    build:
      context: ..
      dockerfile: Dockerfile.web
    environment:
      - NEXT_PUBLIC_API_URL=https://agency.5gvector.com
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: carrier_platform
      POSTGRES_USER: carrier
      POSTGRES_PASSWORD: ${DB_PASSWORD:-carrier}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  # Optional: MCP server for Claude/AI integrations
  mcp:
    build:
      context: ..
      dockerfile: Dockerfile.api
    env_file: ../.env
    command: ["python", "mcp_server/server.py", "--port", "8000"]
    ports:
      - "8000:8000"
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
  pgdata:
  uploads:
  exports:
